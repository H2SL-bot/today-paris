name: Boucle today.paris

# La boucle automatisée du produit, côté données du site EN LIGNE :
#   1. récupère les nouvelles données (lieux OpenStreetMap)   <- ici
#   2-4. fraîcheur / expiration / classement                  <- + à chaque visite (navigateur)
#   7. produit un rapport d'amélioration (dans les logs)      <- ici
#   8. recommence automatiquement                              <- ici (programmé)
# (5-6 = mesure des clics : nécessite un petit backend, voir README.)

on:
  schedule:
    # L'ordonnanceur GitHub ne tient PAS l'heure : sur les 9 dernières exécutions,
    # le retard entre l'heure cron et la création du run allait de 5h28 à 8h47
    # (médiane 6h07). Un créneau unique ne peut donc rien garantir. On en pose
    # cinq dans la nuit : le premier qui part fait le travail, les suivants
    # sortent immédiatement grâce au contrôle de fraîcheur ci-dessous.
    # Tous tombent APRÈS minuit à Paris, donc fetch:events construit bien le
    # bon jour (la date est calculée en Europe/Paris, pas en UTC).
    - cron: "7 22 * * *" # 00h07 Paris
    - cron: "13 23 * * *" # 01h13 Paris
    - cron: "23 0 * * *" # 02h23 Paris
    - cron: "37 1 * * *" # 03h37 Paris
    - cron: "47 2 * * *" # 04h47 Paris
  workflow_dispatch: {} # + lancement manuel depuis l'onglet Actions

permissions:
  contents: write

concurrency:
  group: boucle-today-paris
  cancel-in-progress: false

jobs:
  boucle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Historique complet : un clone superficiel n'a pas de base de fusion,
          # donc pas de rebase fiable avant la publication.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Contrôle de fraîcheur : avec cinq créneaux nocturnes, seul le premier
      # doit réellement aller chercher les données. Les suivants sortent ici,
      # ce qui évite de marteler Overpass et l'Open Data quatre fois pour rien.
      - name: Les données du jour sont-elles déjà là ?
        id: fraicheur
        run: |
          JOUR=$(TZ=Europe/Paris date +%F)
          POUR=$(node -e "try{process.stdout.write(String(require('./domains/today.paris/events.json').builtFor||''))}catch(e){}")
          echo "aujourd'hui (Paris) = $JOUR · instantané = ${POUR:-aucun}"
          if [ "$POUR" = "$JOUR" ]; then
            echo "frais=true" >> "$GITHUB_OUTPUT"
            echo "Données du jour déjà en place — récupération sautée."
          else
            echo "frais=false" >> "$GITHUB_OUTPUT"
          fi

      # 1a. Récupère les lieux (cafés, bars, parcs) avec leurs vrais horaires.
      #     Si Overpass est momentanément indisponible, on garde l'instantané précédent.
      - name: Rafraîchir les lieux (OpenStreetMap)
        if: steps.fraicheur.outputs.frais != 'true'
        run: npm run fetch:venues
        continue-on-error: true

      # 1b. Récupère l'inventaire COMPLET des événements du jour (Open Data Ville de Paris).
      #     Si l'API est momentanément indisponible, on garde l'instantané précédent
      #     (et le site repasse en direct côté navigateur).
      - name: Rafraîchir les événements (Open Data Paris)
        if: steps.fraicheur.outputs.frais != 'true'
        run: npm run fetch:events
        continue-on-error: true

      # 1c. Traduit les NOUVEAUX événements dans les 12 langues (API Claude, modèle économique).
      #     INACTIF tant que le secret ANTHROPIC_API_KEY n'est pas posé (le script sort proprement).
      #     Garde-fous internes : jamais de suppression, langue sautée si résultat suspect,
      #     échec = repli français (le site ne casse jamais).
      - name: Traduire le délta d'événements (12 langues)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/translate-delta.mjs
        continue-on-error: true

      # 1b bis. Complète les parcs avec les espaces verts de la Ville de Paris (sans clôture).
      #         Inutile quand les lieux n'ont pas été rafraîchis : ils y sont déjà.
      - name: Compléter les espaces verts (Open Data Paris)
        if: steps.fraicheur.outputs.frais != 'true'
        run: node scripts/fetch-parcs.mjs
        continue-on-error: true

      # 2-3-4 + 7. Contrôle fraîcheur + rapport d'amélioration (santé des données) dans les logs.
      - name: Boucle (fraîcheur + rapport)
        run: node loop/run.js --once
        continue-on-error: true

      # Reconstruit le site statique (docs/) à partir des données rafraîchies.
      - name: Reconstruire le site (SPA + pages piliers SEO)
        env:
          CUSTOM_DOMAIN: today.paris
        run: npm run build

      # FILET DE SÉCURITÉ : contrôle le site construit AVANT publication.
      # Volontairement SANS continue-on-error : s'il échoue, l'étape suivante ne
      # s'exécute pas et le site en ligne reste sur sa dernière version saine.
      - name: Contrôler la santé du site (bloque la publication si cassé)
        run: node scripts/healthcheck.mjs

      # 8. Republie UNIQUEMENT si les données ont réellement changé.
      - name: Publier si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Aucun changement de données — rien à republier."
            exit 0
          fi
          git commit -m "boucle: rafraîchissement automatique (événements Open Data + lieux OpenStreetMap)"
          # Un autre écrivain peut avoir poussé entre le checkout et ici : on rebase
          # et on retente au lieu d'échouer sèchement. En cas de conflit on abandonne
          # proprement — le créneau suivant refera le travail, le site reste intact.
          for essai in 1 2 3; do
            if git push; then
              echo "Site republié (tentative $essai)."
              exit 0
            fi
            echo "Push rejeté — un commit est arrivé entre-temps ; rebase puis nouvelle tentative."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Conflit de rebase — publication abandonnée, rien de cassé ; prochain créneau."
              exit 0
            fi
          done
          echo "Publication impossible après 3 tentatives — prochain créneau."
          exit 0
