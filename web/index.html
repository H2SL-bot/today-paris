<!DOCTYPE html>
<html lang="{{htmlLang}}" dir="{{dir}}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <meta name="description" content="{{metaDesc}}" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="{{canonical}}" />
{{hreflang}}
  <script type="application/ld+json">{{jsonld}}</script>

  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{canonical}}" />
  <meta property="og:site_name" content="today.paris" />
  <meta property="og:title" content="{{ogTitle}}" />
  <meta property="og:description" content="{{ogDesc}}" />
  <meta property="og:image" content="https://today.paris/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="{{ogLocale}}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ogTitle}}" />
  <meta name="twitter:description" content="{{ogDesc}}" />
  <meta name="twitter:image" content="https://today.paris/og.png" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗼</text></svg>" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#17161a" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="today.paris" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="demo-banner" id="demoBanner" hidden></div>

  <header class="hero">
    <nav class="langswitch" aria-label="Language">{{langSwitch}}</nav>
    <h1 class="logo">today<span>.paris</span></h1>
    <p class="tagline" id="tagline">{{tagline}}</p>
    <p class="clock" id="clock"></p>
  </header>

  <main>
    <form id="form" class="card form">
      <section class="field">
        <label class="field-label">{{where}}</label>
        <div class="row">
          <select id="neighborhood" class="select" aria-label="{{where}}"></select>
          <button type="button" id="geoloc" class="btn-ghost" title="{{geolocTitle}}">{{geoloc}}</button>
        </div>
        <p class="geo-status" id="geoStatus" hidden></p>
      </section>

      <section class="field">
        <label class="field-label">{{who}}</label>
        <div class="chips" id="groups" role="radiogroup" aria-label="{{who}}"></div>
      </section>

      <section class="field">
        <label class="field-label">{{budget}}</label>
        <div class="chips" id="budgets" role="radiogroup" aria-label="{{budget}}"></div>
      </section>

      <section class="field">
        <label class="field-label">{{mood}}</label>
        <div class="chips" id="moods" role="radiogroup" aria-label="{{mood}}"></div>
      </section>

      <section class="field">
        <label class="field-label">{{time}}</label>
        <div class="chips" id="times" role="radiogroup" aria-label="{{time}}"></div>
      </section>

      <label class="toggle">
        <input type="checkbox" id="openNow" checked />
        <span>{{openNow}}</span>
      </label>

      <button type="submit" class="btn-primary" id="submit">{{submit}}</button>
      <button type="button" class="btn-surprise" id="surprise">{{surprise}}</button>
    </form>

    <section id="results" class="results" aria-live="polite"></section>
    <div id="map" class="map" hidden role="img" aria-label="{{mapLabel}}"></div>

    {{gygSection}}

    <section class="about">
      <h2>{{aboutH2}}</h2>
      <p>{{aboutP}}</p>
      {{faqHtml}}
      <nav class="prelated" aria-label="{{explore}}">
        <span>{{explore}}</span>
        {{pillarLinks}}
      </nav>
    </section>
  </main>

  <footer class="footer"><p>{{footer}}</p></footer>

  <script src="/app.js" type="module"></script>
</body>
</html>
